seed: 42

paths:
  bench_data_root: /root/workspace/datasets/hest_data/eval/bench_data/IDC 
  checkpoint_dir: /root/workspace/outputs/img2rad/checkpoints
  stnet_ckpt_dir: /root/workspace/archive/impl/stnet/checkpoints/run_20260327_052645 # need to modify 
  log_dir: /root/workspace/logs/img2rad

model:
  genes_criteria: var
  num_genes: 250
  backbone_name: densenet121
  freeze_img2rad: false
  radiomics_head_hidden_dims: [512, 256]
  gene_head_hidden_dims: [512, 256]
  dropout: 0.1
  pretrained: true

train:
  batch_size: 32
  max_epochs: 50
  num_epochs_img2rad: 50
  num_epochs_gene: 50
  lr: 1.0e-4 # =0.0001
  weight_decay: 1.0e-4 # =0.0001
  optimizer_name: adamw
  num_workers: 0
  pin_memory: true

runtime:
  device: cuda:1
  folds: [0, 1, 2, 3]
  run_train: true
  run_eval: true

data:
  normalize_gene_expression: true
  radiomics_parquet_dir: /root/workspace/datasets/hest_data/eval/bench_data/IDC/radiomics_normpersample
  radiomics_key_column: barcode
  radiomics_ignore_columns:
    - sample_id
    - patch_idx
    - patch_id
    - barcode
    - status
  radiomics_apply_train_split_scaling: false  # train 기준 normalization 적용 여부 

