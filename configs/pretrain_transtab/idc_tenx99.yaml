seed: 42

experiment:
  name: pretrain_transtab_idc_tenx99
  project_name: rapacl-transtab
  save_config: true

paths:
  data_root: /root/workspace/datasets/prepared_tabular/IDC_TENX99
  output_root: /root/workspace/RaPaCL/outputs/rapacl/IDC_TENX99
  log_dir: /root/workspace/RaPaCL/outputs/rapacl/IDC_TENX99/logs
  checkpoint_dir: /root/workspace/RaPaCL/outputs/rapacl/IDC_TENX99/checkpoints

runtime:
  device: cuda:0

train:
  batch_size: 32
  max_epochs: 50
  lr: 0.0001
  num_workers: 4
  optimizer_name: adamw
  weight_decay: 0.0
  patience: 5
  eval_batch_size: 256
  warmup_ratio: null
  warmup_steps: null
  eval_metric: val_loss
  eval_less_is_better: true

model:
  type: transtab_cl
  hidden_dim: 128
  num_layer: 2
  num_attention_head: 8
  ffn_dim: 256
  hidden_dropout_prob: 0.0
  activation: relu

  projection_dim: 128
  num_partition: 3
  overlap_ratio: 0.5
  supervised: true
  ignore_duplicate_cols: true

data:
  dataset_type: custom
  data_csv: data_processed.csv
  numerical_feature_file: numerical_feature.txt
  binary_feature_file: null
  target_col: target_label

wandb:
  enabled: false
  project: rapacl-transtab
  entity: null
  run_name: null
  tags: [IDC, TENX99, pretrain, transtab]
  notes: "TransTab pretraining with original custom dataset format"