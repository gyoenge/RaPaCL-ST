seed: 42

experiment:
  name: pretrain_transtab_idc_allxenium
  project_name: rapacl-transtab
  save_config: true

paths:
  data_root: /root/workspace/datasets/prepared_tabular/PANCANCER_BENCH
  output_root: /root/workspace/RaPaCL/outputs/rapacl/PANCANCER_BENCH
  log_dir: /root/workspace/RaPaCL/outputs/rapacl/PANCANCER_BENCH/logs
  checkpoint_dir: /root/workspace/RaPaCL/outputs/rapacl/PANCANCER_BENCH/checkpoints

# runtime:
#   device: cuda:0
runtime:
  device: cuda
  distributed: true

train:
  batch_size: 32
  max_epochs: 50
  lr: 0.0001
  num_workers: 4
  optimizer_name: adamw
  weight_decay: 0.0
  patience: 5 # 50 
  eval_batch_size: 256
  warmup_ratio: null
  warmup_steps: null
  eval_metric: val_loss
  eval_less_is_better: true

model:
  type: transtab_cl
  hidden_dim: 128
  num_layer: 2
  num_attention_head: 8
  ffn_dim: 256
  hidden_dropout_prob: 0.0
  activation: relu

  projection_dim: 128
  num_partition: 3
  overlap_ratio: 0.5
  supervised: true ### 
  ignore_duplicate_cols: true

data:
  dataset_type: custom
  data_csv: data_processed.csv
  numerical_feature_file: numerical_feature.txt
  binary_feature_file: null
  target_col: target_label

wandb:
  enabled: false
  project: rapacl-transtab
  entity: null
  run_name: null
  tags: [IDC, ALLXENIUM, pretrain, transtab]
  notes: "TransTab pretraining with original custom dataset format"


# CUDA_VISIBLE_DEVICES=0,1 torchrun --nproc_per_node=2 -m src.rapacl.pretrain_transtab --config configs/pretrain_transtab/pancancer_bench.yaml --mode train

evaluation:
  # checkpoint_name: extractor # null이면 가장 최근 checkpoint dir 사용
  split: test
  batch_size: 256
  methods: [umap, tsne]
  umap_n_neighbors: 15
  umap_min_dist: 0.1
  tsne_perplexity: 30

# python -m src.rapacl.pretrain_transtab_evaluation --config configs/pretrain_transtab/pancencer_bench.yaml --mode eval
# python -m src.rapacl.pretrain_transtab_evaluation --config configs/pretrain_transtab/pancencer_bench.yaml --mode eval_detailed

